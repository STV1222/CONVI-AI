version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: convi_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    command: sh -c "npx prisma migrate deploy && npx prisma db seed && npm start"
    environment:
      DATABASE_URL: postgres://postgres:password@postgres:5432/convi_ai
      PORT: 3001
      AI_SERVICE_URL: http://ai-service:8000
    ports:
      - "3001:3001"
    depends_on:
      - postgres
      - ai-service

  ai-service:
    build: ./ai-service
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
